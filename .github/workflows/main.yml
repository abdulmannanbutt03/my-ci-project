name: Node CI + CD

on: push   # Run pipeline whenever code is pushed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # GitHub gives a temporary Ubuntu machine

    steps:
      # Step 1: Get your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18   # Install Node version 18

      # Step 3: Install dependencies (CI)
      - name: Install packages
        run: npm install

      # Step 4: Run tests (CI)
      - name: Run tests
        run: npm test

      # Step 5: Deploy code (CD)
      - name: Deploy to server folder
        run: |
          mkdir -p $HOME/server
          cp -r * $HOME/server
          echo "CD Done! Code deployed."
